<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="a-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <linearGradient id="a-bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#007FFF" stop-opacity="0.7"></stop>
      <stop offset="100%" stop-color="#D72483" stop-opacity="1"></stop>
    </linearGradient>
  </defs>

  
  <line x1="28" y1="160" x2="172" y2="160" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="1" filter="url(#a-glow)"></line>

  
  <g filter="url(#a-glow)">
    <rect x="36" width="14" y="130" height="30" fill="url(#a-bar)" rx="2">
      
      
    </rect>
    <rect x="60" width="14" y="120" height="40" fill="url(#a-bar)" rx="2">
      
      
    </rect>
    <rect x="84" width="14" y="110" height="50" fill="url(#a-bar)" rx="2">
      
      
    </rect>
    <rect x="108" width="14" y="100" height="60" fill="url(#a-bar)" rx="2">
      
      
    </rect>
    <rect x="132" width="14" y="90" height="70" fill="url(#a-bar)" rx="2">
      
      
    </rect>
  </g>

  
  <polyline fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#a-glow)" points="43,120 67,95 91,85 115,65 139,45" stroke-dasharray="180" stroke-dashoffset="180">
    
  </polyline>

  
  <circle r="4" fill="#FFFFFF" filter="url(#a-glow)" cx="43" cy="120" opacity="0">
    
    
    
  </circle>
</svg>