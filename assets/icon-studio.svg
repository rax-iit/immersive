<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="s-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.8" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <linearGradient id="s-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2030"></stop>
      <stop offset="100%" stop-color="#2a1830"></stop>
    </linearGradient>
    <linearGradient id="s-road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2838"></stop>
      <stop offset="100%" stop-color="#161622"></stop>
    </linearGradient>
    <linearGradient id="s-cursor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#007FFF" stop-opacity="0"></stop>
      <stop offset="50%" stop-color="#007FFF" stop-opacity="1"></stop>
      <stop offset="100%" stop-color="#007FFF" stop-opacity="0"></stop>
    </linearGradient>
    <clipPath id="s-frame">
      <rect x="14" y="14" width="172" height="172" rx="6"></rect>
    </clipPath>
  </defs>

  <g clip-path="url(#s-frame)">
    
    <rect x="14" y="14" width="172" height="172" rx="6" fill="url(#s-sky)"></rect>
    <rect x="14" y="110" width="172" height="76" fill="url(#s-road)"></rect>

    
    <g stroke="#444860" stroke-width="1.2" stroke-dasharray="6 6" opacity="0.6">
      <line x1="14" y1="130" x2="186" y2="130"></line>
      <line x1="14" y1="155" x2="186" y2="155"></line>
    </g>

    
    <g fill="#4a5270">
      <rect x="38" y="118" width="44" height="22" rx="4"></rect>
      <rect x="44" y="110" width="32" height="12" rx="3"></rect>
      <circle cx="48" cy="142" r="4" fill="#2a2e40"></circle>
      <circle cx="74" cy="142" r="4" fill="#2a2e40"></circle>
    </g>

    
    <g fill="#5a4a70">
      <circle cx="110" cy="108" r="5"></circle>
      <rect x="105" y="114" width="10" height="22" rx="3"></rect>
      <rect x="102" y="136" width="4" height="12" rx="1"></rect>
      <rect x="114" y="136" width="4" height="12" rx="1"></rect>
    </g>

    
    <g fill="#4a5060">
      <rect x="148" y="106" width="2" height="30"></rect>
      <circle cx="149" cy="102" r="7" fill="#6a5a40"></circle>
    </g>

    
    <g fill="#FFFFFF" opacity="0.08">
      <circle cx="30" cy="30" r="1"></circle><circle cx="60" cy="30" r="1"></circle>
      <circle cx="90" cy="30" r="1"></circle><circle cx="120" cy="30" r="1"></circle>
      <circle cx="150" cy="30" r="1"></circle><circle cx="170" cy="30" r="1"></circle>
      <circle cx="30" cy="60" r="1"></circle><circle cx="60" cy="60" r="1"></circle>
      <circle cx="90" cy="60" r="1"></circle><circle cx="120" cy="60" r="1"></circle>
      <circle cx="150" cy="60" r="1"></circle><circle cx="170" cy="60" r="1"></circle>
      <circle cx="30" cy="90" r="1"></circle><circle cx="60" cy="90" r="1"></circle>
      <circle cx="90" cy="90" r="1"></circle><circle cx="120" cy="90" r="1"></circle>
      <circle cx="150" cy="90" r="1"></circle><circle cx="170" cy="90" r="1"></circle>
    </g>

    
    <rect x="-4" y="14" width="2" height="172" fill="url(#s-cursor)" opacity="0.95">
      
      
    </rect>

    
    <g filter="url(#s-glow)">
      <rect x="36" y="107" width="48" height="39" fill="none" stroke="#007FFF" stroke-width="2" rx="2" stroke-dasharray="200" stroke-dashoffset="200">
        
      </rect>
      <g fill="#007FFF" opacity="0">
        
        <rect x="33" y="104" width="5" height="5"></rect>
        <rect x="82" y="104" width="5" height="5"></rect>
        <rect x="33" y="143" width="5" height="5"></rect>
        <rect x="82" y="143" width="5" height="5"></rect>
      </g>
      <g opacity="0">
        
        <rect x="36" y="93" width="34" height="12" rx="2" fill="#007FFF"></rect>
        <text x="53" y="102" font-family="Inter, -apple-system, sans-serif" font-size="8" font-weight="700" fill="#FFFFFF" text-anchor="middle">car</text>
      </g>
    </g>

    
    <g filter="url(#s-glow)">
      <rect x="100" y="101" width="20" height="51" fill="none" stroke="#D72483" stroke-width="2" rx="2" stroke-dasharray="200" stroke-dashoffset="200">
        
      </rect>
      <g fill="#D72483" opacity="0">
        
        <rect x="97" y="98" width="5" height="5"></rect>
        <rect x="118" y="98" width="5" height="5"></rect>
        <rect x="97" y="149" width="5" height="5"></rect>
        <rect x="118" y="149" width="5" height="5"></rect>
      </g>
      <g opacity="0">
        
        <rect x="100" y="87" width="50" height="12" rx="2" fill="#D72483"></rect>
        <text x="125" y="96" font-family="Inter, -apple-system, sans-serif" font-size="8" font-weight="700" fill="#FFFFFF" text-anchor="middle">person</text>
      </g>
    </g>

    
    <g filter="url(#s-glow)">
      <circle cx="149" cy="102" r="0" fill="none" stroke="#F59E0B" stroke-width="2">
        
      </circle>
      <g opacity="0">
        
        <rect x="131" y="80" width="36" height="12" rx="2" fill="#F59E0B"></rect>
        <text x="149" y="89" font-family="Inter, -apple-system, sans-serif" font-size="8" font-weight="700" fill="#14141a" text-anchor="middle">sign</text>
      </g>
    </g>
  </g>

  
  <g>
    <rect x="14" y="178" width="172" height="8" fill="#0f0f15"></rect>
    <rect x="14" y="178" width="0" height="8" fill="#007FFF" opacity="0.7">
      
    </rect>
  </g>
</svg>