<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="d-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <radialGradient id="d-sweep-grad" cx="0" cy="0.5" r="1">
      <stop offset="0%" stop-color="#D72483" stop-opacity="0.9"></stop>
      <stop offset="60%" stop-color="#D72483" stop-opacity="0.35"></stop>
      <stop offset="100%" stop-color="#D72483" stop-opacity="0"></stop>
    </radialGradient>
  </defs>

  
  <g fill="none" stroke="#FFFFFF" stroke-opacity="0.22">
    <circle cx="100" cy="100" r="30"></circle>
    <circle cx="100" cy="100" r="55"></circle>
    <circle cx="100" cy="100" r="80"></circle>
  </g>

  
  <g stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="1">
    <line x1="20" y1="100" x2="180" y2="100"></line>
    <line x1="100" y1="20" x2="100" y2="180"></line>
  </g>

  
  <g fill="none" stroke="#D72483" filter="url(#d-glow)">
    <circle cx="100" cy="100" r="30" stroke-width="2" opacity="0">
      
      
    </circle>
    <circle cx="100" cy="100" r="30" stroke-width="2" opacity="0">
      
      
    </circle>
  </g>

  
  <g transform="translate(100 100)" filter="url(#d-glow)">
    <g>
      
      
      <path d="M 0 0 L 82 0 A 82 82 0 0 0 41 -71 Z" fill="url(#d-sweep-grad)"></path>
      <line x1="0" y1="0" x2="82" y2="0" stroke="#D72483" stroke-width="1.6" opacity="0.95"></line>
    </g>
  </g>

  
  <circle cx="100" cy="100" r="3" fill="#FFFFFF" filter="url(#d-glow)"></circle>

  
  <g filter="url(#d-glow)">
    
    <circle cx="150" cy="77" r="3" fill="#D72483">
      
      
    </circle>
    
    <circle cx="55" cy="135" r="3" fill="#007FFF">
      
      
    </circle>
    
    <circle cx="45" cy="70" r="3" fill="#D72483">
      
      
    </circle>
    
    <circle cx="155" cy="130" r="3" fill="#FFFFFF">
      
      
